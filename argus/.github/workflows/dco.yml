name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list --no-merges "$base..$head"); do
            msg=$(git log -1 --format=%B "$sha")
            if ! echo "$msg" | grep -qE '^Signed-off-by:'; then
              echo "Missing Signed-off-by on commit $sha"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo
            echo "Add 'Signed-off-by: Your Name <email>' to every commit (use 'git commit -s')."
            exit 1
          fi
